<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holiday Planner (AI Version)</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8f9fa;
    }
    .hero {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
      color: white;
      text-align: center;
      padding: 80px 20px;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
    }
    .result-card img {
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
    }
    .ai-label {
      font-size: 11px;
      font-weight: 600;
      color: #185FA5;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    #aiInsights {
      font-size: 13px;
      color: #444;
      white-space: pre-wrap;
      line-height: 1.7;
    }
    #suggestResult {
      font-size: 13px;
      color: #444;
      white-space: pre-wrap;
      line-height: 1.7;
      margin-top: 8px;
    }
    #apiKeyInput {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      font-size: 13px;
    }
    #apiKeyInput::placeholder {
      color: rgba(255,255,255,0.6);
    }
    #apiKeyInput:focus {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.7);
      color: white;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <h1>Plan Your Perfect Holiday</h1>
    <p class="lead">Search any destination in the world 🌍</p>
    <div class="container mt-4" style="max-width: 600px;">

      <!-- API Key Input -->
      <div class="mb-3">
        <input type="text" id="apiKeyInput" class="form-control"
        value="AIzaSyAR1jShV_CcTSBKzog5Sw6VgGSHeBjjpag"
  placeholder="🔑 Paste your Anthropic API key here to enable AI insights">
        <small style="color: rgba(255,255,255,0.5); font-size:11px;">
          Get a free key at console.anthropic.com — never shared or stored
        </small>
      </div>

      <!-- Search Bar -->
      <div class="input-group mb-3">
        <input type="text" id="searchBox" class="form-control" placeholder="Search destination (e.g., Rome, Bali, Muscat...)">
        <button id="searchBtn" class="btn btn-light">Search</button>
      </div>

      <div id="searchResult" class="mt-4"></div>
    </div>
  </section>

  <!-- Planner Tools -->
  <section class="container my-5">
    <h2 class="text-center mb-5">Holiday Planner Tools</h2>
    <div class="row g-4">

      <!-- Activities -->
      <div class="col-md-4">
        <div class="p-3 border rounded bg-white h-100">
          <h4><i class="fa-solid fa-list-check"></i> Activities</h4>
          <label><input type="checkbox" class="activity" value="200"> Sightseeing ($200)</label><br>
          <label><input type="checkbox" class="activity" value="100"> Hiking ($100)</label><br>
          <label><input type="checkbox" class="activity" value="150"> Beach Party ($150)</label><br>
          <label><input type="checkbox" class="activity" value="250"> Adventure Sports ($250)</label><br>
          <label><input type="checkbox" class="activity" value="300"> Luxury Dinner ($300)</label>
        </div>
      </div>

      <!-- Budget Calculator -->
      <div class="col-md-4">
        <div class="p-3 border rounded bg-white h-100">
          <h4><i class="fa-solid fa-wallet"></i> Budget Calculator</h4>
          <label>Transport ($):</label>
          <input type="number" id="transport" class="form-control mb-2" placeholder="e.g. 500">
          <label>Hotel ($):</label>
          <input type="number" id="hotel" class="form-control mb-2" placeholder="e.g. 1000">
          <label>Food ($):</label>
          <input type="number" id="food" class="form-control mb-2" placeholder="e.g. 300">
          <p class="mt-3"><strong>Total Budget: $<span id="totalBudget">0</span></strong></p>
        </div>
      </div>

      <!-- Itinerary -->
      <div class="col-md-4">
        <div class="p-3 border rounded bg-white h-100">
          <h4><i class="fa-solid fa-calendar-days"></i> Itinerary</h4>
          <input type="text" id="itineraryInput" class="form-control mb-2" placeholder="Add activity or place">
          <button class="btn btn-primary w-100 mb-2" id="addItinerary">Add</button>
          <ul id="itineraryList" class="list-group mb-2"></ul>
          <button class="btn btn-outline-secondary w-100" id="suggestBtn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Suggest activities for my destination
          </button>
          <div id="suggestResult"></div>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center p-3 bg-dark text-white">
    <p>© 2025 Holiday Planner | All Rights Reserved</p>
  </footer>

  <!-- Script -->
  <script>
    const UNSPLASH_ACCESS_KEY = "dhQmCCJen-d0j51taqICVRdRi1oUaeTMmmyzQ1b4M9g";
    let currentDestination = "";

    // ── Claude API Call ─────────────────────────────────────────────
  async function getClaudeInsights(prompt) {
  const apiKey = $("#apiKeyInput").val().trim();
  if (!apiKey) return "Paste your API key above to see AI insights.";
  try {
    let res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }]
      })
    });
    let data = await res.json();
    console.log("Full Gemini response:", JSON.stringify(data));
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No insights available.";
  } catch (e) {
    console.error("Error:", e);
    return "Error: " + e.message;
  }
}

    // ── Search Destination ──────────────────────────────────────────
    $("#searchBtn").click(async function () {
      let query = $("#searchBox").val().trim();
      if (!query) return;
      currentDestination = query;
      $("#searchBtn").prop("disabled", true).text("Searching...");
      $("#searchResult").html(`<p class="text-info">🔎 Searching for "${query}"...</p>`);

      try {
        // Wikipedia summary
        let wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
        let wikiData = await wikiRes.json();

        // Unsplash image
        let imgRes = await fetch(`https://api.unsplash.com/search/photos?query=${query}&client_id=${UNSPLASH_ACCESS_KEY}`);
        let imgData = await imgRes.json();
        let imgUrl = imgData.results.length > 0
          ? imgData.results[0].urls.regular
          : (wikiData.thumbnail?.source || "https://via.placeholder.com/400");

        // Render card with AI loading state
        $("#searchResult").html(`
          <div class="card result-card mx-auto shadow" style="max-width: 600px; text-align: left;">
            <img src="${imgUrl}" class="card-img-top" alt="${query}">
            <div class="card-body">
              <h5 class="card-title">${wikiData.title || query}</h5>
              <p class="card-text">${wikiData.extract || "No details found."}</p>
              <hr>
              <p class="ai-label">✦ AI Travel Insights</p>
              <p id="aiInsights" style="font-style:italic; color:#888;">Generating insights...</p>
            </div>
          </div>
        `);

        // Fetch AI insights
        let aiText = await getClaudeInsights(
          `Give me a concise travel guide for ${query}:

Best time to visit: (1-2 sentences)
Top 3 must-see spots: (brief list)
Local food to try: (3-4 items)
Insider tip: (1 sentence)
Estimated daily budget: (budget / mid-range / luxury in USD)

Keep total response under 200 words.`
        );
        $("#aiInsights").css({ "font-style": "normal", "color": "#444" }).text(aiText);

      } catch (err) {
        $("#searchResult").html(`<p class="text-danger">❌ Could not find details for "${query}".</p>`);
      }

      $("#searchBtn").prop("disabled", false).text("Search");
    });

    // Enter key triggers search
    $("#searchBox").on("keydown", function (e) {
      if (e.key === "Enter") $("#searchBtn").click();
    });

    // ── Budget Calculator ───────────────────────────────────────────
    function updateBudget() {
      let transport = parseInt($("#transport").val()) || 0;
      let hotel = parseInt($("#hotel").val()) || 0;
      let food = parseInt($("#food").val()) || 0;
      let activities = 0;
      $(".activity:checked").each(function () {
        activities += parseInt($(this).val());
      });
      let total = transport + hotel + food + activities;
      $("#totalBudget").text(total.toLocaleString());
    }
    $("#transport, #hotel, #food").on("input", updateBudget);
    $(".activity").on("change", updateBudget);

    // ── Itinerary ───────────────────────────────────────────────────
    $("#addItinerary").click(function () {
      let item = $("#itineraryInput").val().trim();
      if (item) {
        $("#itineraryList").append(`
          <li class="list-group-item d-flex justify-content-between align-items-center">
            ${item}
            <span style="cursor:pointer; color:#aaa;" onclick="$(this).parent().remove()">✕</span>
          </li>`);
        $("#itineraryInput").val("");
      }
    });

    // Enter key adds to itinerary
    $("#itineraryInput").on("keydown", function (e) {
      if (e.key === "Enter") $("#addItinerary").click();
    });

    // ── AI Activity Suggestions ─────────────────────────────────────
    $("#suggestBtn").click(async function () {
      let dest = currentDestination || "a popular travel destination";
      $("#suggestResult").html(`<span style="color:#888; font-style:italic;">Getting suggestions for ${dest}...</span>`);
      let text = await getClaudeInsights(
        `Suggest 5 specific activities for a trip to ${dest}. For each, include a one-line description and estimated cost in USD. Format as a numbered list.`
      );
      $("#suggestResult").text(text);
    });
  </script>

</body>
</html>
