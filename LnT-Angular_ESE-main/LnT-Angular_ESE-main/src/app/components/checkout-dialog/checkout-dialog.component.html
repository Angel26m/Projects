<h2 mat-dialog-title class="dialog-title">
    <mat-icon color="primary" class="success-icon">check_circle</mat-icon>
    Purchase Successful!
</h2>
<mat-dialog-content class="mat-typography">
    <p>Thank you for your order. We've received your information and are preparing it for shipment.</p>
    <p>A confirmation email has been sent to your address.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button color="primary" (click)="closeDialog()">Continue Shopping</button>
</mat-dialog-actions>
